<html>
    <head>
        <title>Tabela</title>
        <style>
            table, th, td{
                border:2px solid black;
                border-collapse: collapse;
                background-color: gray;
            }
        </style>
    </head>
    <body>
        <h1>Tabelas</h1>
        <table>
            <thead>
            <tr>
                <th>País</th>
                <th>Capital</th>
                </thead>
                <tbody>
            </tr>
             <tr>
                <td>Argentina</td>
                <td>Buenos Aires</td>
            </tr>
             <tr>
                <td>Chile</td>
                <td>Santiago</td>
            </tr>
             <tr>
                <tfoot>
                <td>Russia</td>
                <td>Moscow</td>
                </tfoot>
                <caption>Legenda da tabela</caption>
            </tbody>
            </tr>
        </table>
        <table>
            <tr>
                <th colspan="2">Produtos</th>
            </tr>
            <tr>
                <td>Produto</td>
                <td>Preço</td>
            </tr>
            <tr>
                <td>Maça</td>
                <td>R$7.34</td>
            </tr>
            <tr>
                <th colspan="2">contato</th>
            </tr>
            <tr>
                <th rowspan="3">Fulano de tal</th>
                <td>rua centro, joinville</td>
            </tr>
        </table>


    </body>
</html>
