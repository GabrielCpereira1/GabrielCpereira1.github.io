<html>
    <head>
        <title>Texto e Estilo de fontes</title>
        <meta charset="UTF-8">
        <style>
            h1 {
                color: green;
                text-decoration: overline;
                text-decoration-color: green;
                text-decoration-thickness: 5px;
                font-family: serif;
            }
            h2 {
                text-transform: uppercase;
                font-family: monospace;
                color: rgb(253, 72, 72);
                text-decoration: underline;
            }
            h3 {
                text-transform: none;
                font-family: fantasy;
                color: rgb(18, 180, 180);
                text-decoration: line-through;
            }
            h4 {
                text-transform: lowercase;
                font-family: sans-serif;
                font-weight: bolder;
                color: rgb(185, 110, 255);
                text-decoration: overline underline;
                text-align: right;
            }
            h5 {
                text-transform: capitalize;
                background-color: beige;
                text-align: left;

            }
            p {
                text-shadow: #FC0 1px 0 10px;
                font-size: 2em;
                font-style: italic;
                font-family: cursive;
                color: rgb(253, 182, 76);
                text-align: center;
                line-height: 1.6;
                letter-spacing: 4px;
                word-spacing: 4px;
            }
        </style>
    </head>
    <body>
        <table>
            <h1>Texto e Estilo de fontes</h1>
            <h2>Texto e Estilo de fontes</h2>
            <h3>Texto e Estilo de fontes</h3>
            <h4>Texto e Estilo de fontes</h4>
            <h5>Texto e Estilo de fontes</h5>
            <p>Exemplo de texto.
            <i class="fa-solid fa-circle" style="color: rgb(116, 192, 252);"></i></p>
        </table>
    </body>
</html>
